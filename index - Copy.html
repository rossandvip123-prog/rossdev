<!DOCTYPE html>

<html>
<head>
<title>Ross's Dev</title>

<style>

body{
background:#020617;
font-family:Arial;
color:white;
margin:0;
text-align:center;
}

/* HEADER */

.header{
font-size:40px;
padding:30px;
color:#38bdf8;
box-shadow:0 0 20px #0ea5e9;
margin:30px;
border-radius:15px;
}

/* SPOTIFY PLAYER */

.music{
margin-top:20px;
}

/* HOME CARDS */

.container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:40px;
}

.card{
width:350px;
background:#020617;
border-radius:20px;
overflow:hidden;
cursor:pointer;
box-shadow:0 0 25px #0ea5e9;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 40px #38bdf8;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h2{
color:#38bdf8;
margin-top:10px;
}

.card p{
color:#7dd3fc;
}

/* SECTIONS */

.section{
display:none;
padding:40px;
}

img.project{
max-width:600px;
margin:20px;
border-radius:10px;
box-shadow:0 0 20px #0ea5e9;
}

/* BUTTONS */

button{
margin-top:30px;
padding:12px 25px;
background:#0ea5e9;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#38bdf8;
}

/* DISCORD BUTTON */

.discord{
background:#5865F2;
box-shadow:0 0 15px #5865F2;
}

.discord:hover{
background:#4752C4;
}

</style>

<script>

function showSection(section){

document.getElementById("home").style.display="none";
document.getElementById("scripts").style.display="none";
document.getElementById("maps").style.display="none";

document.getElementById(section).style.display="block";

}

function goHome(){

document.getElementById("home").style.display="block";
document.getElementById("scripts").style.display="none";
document.getElementById("maps").style.display="none";

}

</script>

</head>

<body>

<div class="header">
Ross's Dev
</div>

<!-- SPOTIFY PLAYER -->

<div class="music">

<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/7vFoFDWqTX0mHzLfrF1Cfy?utm_source=generator"
width="300"
height="80"
frameBorder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

<!-- HOME PAGE -->

<div id="home">

<div class="container">

<div class="card" onclick="showSection('scripts')">

<img src="script.jpeg">

<h2>Script Development</h2>
<p>Projects</p>

</div>

<div class="card" onclick="showSection('maps')">

<img src="map.png">

<h2>Map Development</h2>
<p>Projects</p>

</div>

</div>

<br>

<a href="https://discord.com/users/1417402005403734036" target="_blank">
<button class="discord">Contact Me on Discord</button>
</a>

</div>

<!-- SCRIPTS PAGE -->

<div id="scripts" class="section">

<h1>Scripts</h1>

<h2>Nametag System</h2>
<img class="project" src="nametag.png">

<h2>Staff UI Script</h2>

<img class="project" src="staff1.png">
<img class="project" src="staff2.png">
<img class="project" src="staff3.png">

<br>

<button onclick="goHome()">Back</button>

</div>

<!-- MAP PAGE -->

<div id="maps" class="section">

<h1>Map Development</h1>

<h2>Desk Build</h2>
<img class="project" src="desk.png">

<h2>Toilet Door</h2>
<img class="project" src="door.png">

<h2>Simple School</h2>
<img class="project" src="school.png">

<h2>TUI Check-in</h2>
<img class="project" src="tui.png">

<h2>Jet2 Cabin</h2>
<img class="project" src="jet2.png">

<br>

<button onclick="goHome()">Back</button>

</div>

</body>
</html>
