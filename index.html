<!DOCTYPE html>
<html>

<head>

<title>Ross's Dev</title>

<style>

body{
background:#020617;
font-family:Arial;
color:white;
margin:0;
text-align:center;
overflow-x:hidden;
}

/* HEADER */

.header{
font-size:40px;
padding:30px;
color:#38bdf8;
box-shadow:0 0 20px #0ea5e9;
margin:30px;
border-radius:15px;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 20px #0ea5e9;}
to{box-shadow:0 0 40px #38bdf8;}
}

/* CONTAINER */

.container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:40px;
}

/* CARD */

.card{
width:350px;
background:#020617;
border-radius:20px;
overflow:hidden;
cursor:pointer;
box-shadow:0 0 25px #0ea5e9;
transition:0.3s;
}

.card:hover{
transform:scale(1.08) rotate(1deg);
box-shadow:0 0 45px #38bdf8;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h2{
color:#38bdf8;
margin-top:10px;
}

.card p{
color:#7dd3fc;
}

/* SECTIONS */

.section{
display:none;
padding:40px;
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* PROJECT IMAGES */

img.project{
max-width:600px;
margin:20px;
border-radius:10px;
box-shadow:0 0 20px #0ea5e9;
transition:0.3s;
}

img.project:hover{
transform:scale(1.05);
box-shadow:0 0 40px #38bdf8;
}

/* BUTTON */

button{
margin-top:30px;
padding:12px 25px;
background:#0ea5e9;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#38bdf8;
transform:scale(1.05);
}

/* DISCORD */

.discord{
background:#5865F2;
box-shadow:0 0 15px #5865F2;
}

.discord:hover{
background:#4752C4;
}

/* IMAGE SLIDER */

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
}

.viewer img{
max-width:80%;
border-radius:10px;
box-shadow:0 0 40px #38bdf8;
}

.controls{
margin-top:20px;
}

.controls button{
margin:10px;
font-size:20px;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:40px;
cursor:pointer;
}

</style>

<script>

let currentImage = 0

const burgerImages = [
"bk1.png",
"bk2.png",
"bk3.png",
"bk4.png"
]

function showSection(section){

document.getElementById("home").style.display="none"
document.getElementById("scripts").style.display="none"
document.getElementById("maps").style.display="none"

document.getElementById(section).style.display="block"

}

function goHome(){

document.getElementById("home").style.display="block"
document.getElementById("scripts").style.display="none"
document.getElementById("maps").style.display="none"

}

/* BURGER KING VIEWER */

function openBurger(){

document.getElementById("viewer").style.display="flex"
currentImage = 0
document.getElementById("slide").src = burgerImages[currentImage]

}

function closeViewer(){

document.getElementById("viewer").style.display="none"

}

function next(){

currentImage++

if(currentImage >= burgerImages.length){
currentImage = 0
}

document.getElementById("slide").src = burgerImages[currentImage]

}

function prev(){

currentImage--

if(currentImage < 0){
currentImage = burgerImages.length - 1
}

document.getElementById("slide").src = burgerImages[currentImage]

}

</script>

</head>

<body>

<div class="header">
Ross's Dev
</div>

<!-- HOME -->

<div id="home">

<div class="container">

<div class="card" onclick="showSection('scripts')">

<img src="script.jpeg">
<h2>Script Development</h2>
<p>Projects</p>

</div>

<div class="card" onclick="showSection('maps')">

<img src="map.png">
<h2>Map Development</h2>
<p>Projects</p>

</div>

</div>

<br>

<a href="https://discord.com/users/1417402005403734036" target="_blank">
<button class="discord">Contact Me on Discord</button>
</a>

</div>

<!-- SCRIPTS -->

<div id="scripts" class="section">

<h1>Scripts</h1>

<h2>Nametag System</h2>
<img class="project" src="nametag.png">

<h2>Staff UI Script</h2>

<img class="project" src="staff1.png">
<img class="project" src="staff2.png">
<img class="project" src="staff3.png">

<br>

<button onclick="goHome()">Back</button>

</div>

<!-- MAP DEV -->

<div id="maps" class="section">

<h1>Map Development</h1>

<h2>Desk Build</h2>
<img class="project" src="desk.png">

<h2>Toilet Door</h2>
<img class="project" src="door.png">

<h2>Simple School</h2>
<img class="project" src="school.png">

<h2>TUI Check-in</h2>
<img class="project" src="tui.png">

<h2>Jet2 Cabin</h2>
<img class="project" src="jet2.png">

<h2>Burger King Build</h2>

<img class="project" src="bk1.png" onclick="openBurger()">

<br>

<button onclick="goHome()">Back</button>

</div>

<!-- BURGER KING SLIDER -->

<div id="viewer" class="viewer">

<span class="close" onclick="closeViewer()">×</span>

<img id="slide">

<div class="controls">

<button onclick="prev()">❮</button>
<button onclick="next()">❯</button>

</div>

</div>

</body>
</html>
